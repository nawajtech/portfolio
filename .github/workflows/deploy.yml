name: Deploy Laravel to EC2

on:
  push:
    branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Verify secrets
        run: |
          [ -n "${{ secrets.EC2_USER }}" ] || (echo "EC2_USER is missing" && exit 1)
          [ -n "${{ secrets.EC2_HOST }}" ] || (echo "EC2_HOST is missing" && exit 1)

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /var/www/html/portfolio

            git config --global --add safe.directory /var/www/html/portfolio
            git pull origin main

            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize
          EOF